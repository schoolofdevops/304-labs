---
apiVersion: v1
kind: Namespace
metadata:
  name: nimbusai
  labels:
    app.kubernetes.io/part-of: nimbusai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusai-gateway
  namespace: nimbusai
  labels:
    app.kubernetes.io/name: nimbusai-gateway
    app.kubernetes.io/part-of: nimbusai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nimbusai-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimbusai-gateway
        app.kubernetes.io/part-of: nimbusai
    spec:
      containers:
        - name: gateway
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
